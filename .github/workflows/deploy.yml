name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: "!contains(github.event.head_commit.message, '[skip deploy]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload files to VPS
        run: |
          tar --exclude=node_modules --exclude=.next --exclude=.git \
              --exclude=coverage --exclude=test-results \
              --exclude=playwright-report --exclude=.env --exclude=.env.local \
              -cf - . | \
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "tar xf - -C /opt/sites/engenhariabiomedica/app"

      - name: Build and restart container
        run: |
          ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd /opt/sites/engenhariabiomedica && docker compose build --no-cache && docker compose up -d"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(ssh -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "curl -s -o /dev/null -w '%{http_code}' http://localhost:3000/ || docker exec traefik wget -qO /dev/null http://engenhariabiomedica:3000/ && echo 200")
          echo "Health check: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health check returned $STATUS"
          fi

      - name: Notify success (Slack)
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Deploy concluído — \`${{ github.event.head_commit.message }}\`\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }} || true

      - name: Notify failure (Slack)
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Deploy falhou! Ver: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }} || true
