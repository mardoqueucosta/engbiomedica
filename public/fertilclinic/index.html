// ============================================================
const WHO_REFS = {

// ============================================================
// RISK ENGINE
// ============================================================
const RISK_WEIGHTS = {
  age_40plus: 3.0, age_35_39: 1.5,
  smoking_frequent: 3.5, smoking_moderate: 2.5, smoking_sporadic: 1.0,
  drugs: 2.0, anxiety: 1.8, depression: 2.2, stress: 1.5,
  diabetes: 2.0, hypertension: 1.5, varicocele: 3.0,
  cryptorchidism: 3.5, mumps: 1.8, steroids: 3.0,
  chemical_exposure: 2.0, sti_history: 2.0, cellphone_daily: 0.8,
  motility_below_ref: 4.0, viability_below_ref: 4.0, concentration_below_ref: 4.5,
};

const RISK_LEVELS = [
  { max: 4, label: "Baixo", color: "#22c55e", bg: "#f0fdf4", rec: "Manter acompanhamento de rotina. Reforçar hábitos saudáveis." },
  { max: 8, label: "Moderado", color: "#f59e0b", bg: "#fffbeb", rec: "Investigação andrológica recomendada. Considerar modificação de fatores de estilo de vida." },
  { max: 14, label: "Alto", color: "#f97316", bg: "#fff7ed", rec: "Encaminhamento prioritário para urologista/andrologista. Avaliação laboratorial completa. Suporte psicológico indicado." },
  { max: Infinity, label: "Crítico", color: "#ef4444", bg: "#fef2f2", rec: "Encaminhamento urgente. Avaliação multidisciplinar (urologia + endocrinologia + saúde mental). Considerar reprodução assistida." },
];

function calculateRisk(pd, sd) {
  let score = 0;
  const factors = [];
  const add = (n, w, c) => { score += w; factors.push({ name: n, weight: w, category: c }); };

  const age = parseInt(pd.age) || 0;
  if (age >= 40) add("Idade ≥ 40 anos", 3.0, "Demográfico");
  else if (age >= 35) add("Idade 35-39 anos", 1.5, "Demográfico");

  if (pd.smoking === "Sim") {
    const w = pd.smokingFreq === "Frequentemente" ? 3.5 : pd.smokingFreq === "Razoavelmente" ? 2.5 : 1.0;
    add("Tabagismo (" + (pd.smokingFreq || "uso") + ")", w, "Estilo de vida");
  }
  if (pd.drugs === "Sim") add("Uso de drogas", 2.0, "Estilo de vida");
  if (pd.steroids === "Sim") add("Esteroides anabolizantes", 3.0, "Estilo de vida");
  if (pd.anxiety === "Sim") add("Ansiedade", 1.8, "Saúde mental");
  if (pd.depression === "Sim") add("Depressão", 2.2, "Saúde mental");
  if (pd.stress === "Sim") add("Estresse", 1.5, "Saúde mental");
  if (pd.diabetes === "Sim") add("Diabetes", 2.0, "Comorbidade");
  if (pd.hypertension === "Sim") add("Hipertensão", 1.5, "Comorbidade");
  if (pd.varicocele === "Sim") add("Varicocele", 3.0, "Clínico");
  if (pd.cryptorchidism === "Sim") add("Criptorquidia", 3.5, "Clínico");
  if (pd.mumps === "Sim") add("Histórico de caxumba", 1.8, "Clínico");
  if (pd.chemicalExposure === "Sim") add("Exposição química", 2.0, "Ambiental");
  if (pd.cellphone === "Sim" && pd.cellphoneFreq === "Todos os dias") add("Celular no bolso (diário)", 0.8, "Ambiental");

  if (sd && sd.motility) { const v = parseFloat(sd.motility); if (!isNaN(v) && v < 42) add("Motilidade < 42% (" + v + "%)", 4.0, "Laboratorial"); }
  if (sd && sd.viability) { const v = parseFloat(sd.viability); if (!isNaN(v) && v < 54) add("Vitalidade < 54% (" + v + "%)", 4.0, "Laboratorial"); }
  if (sd && sd.concentration) { const v = parseFloat(sd.concentration); if (!isNaN(v) && v < 16) add("Concentração < 16 ×10⁶/mL", 4.5, "Laboratorial"); }

  const rl = RISK_LEVELS.find(r => score <= r.max) || RISK_LEVELS[3];

  const recs = [];
  const lab = factors.filter(f => f.category === "Laboratorial");
  const mental = factors.filter(f => f.category === "Saúde mental");
  const life = factors.filter(f => f.category === "Estilo de vida");
  const clin = factors.filter(f => f.category === "Clínico" || f.category === "Comorbidade");

  if (lab.length > 0) recs.push({ icon: "🔬", text: "Repetir espermograma em 2-4 semanas. Considerar avaliação hormonal (FSH, LH, Testosterona).", priority: "high" });
  if (mental.length > 0) recs.push({ icon: "🧠", text: "Encaminhamento para suporte psicológico (" + mental.map(f => f.name).join(", ") + "). 80% dos especialistas consultados ratificam esta indicação.", priority: "high" });
  if (life.length > 0) recs.push({ icon: "🏃", text: "Intervenção em estilo de vida: " + life.map(f => f.name).join(", ") + ". Orientar cessação/redução.", priority: "medium" });
  if (clin.length > 0) recs.push({ icon: "⚕️", text: "Investigação clínica: " + clin.map(f => f.name).join(", ") + ". Encaminhamento ao especialista.", priority: "high" });
  if (score >= 8) recs.push({ icon: "💰", text: "Avaliar barreiras financeiras. 70,8% dos profissionais identificam o custo como fator limitante.", priority: "medium" });
  if (recs.length === 0) recs.push({ icon: "✅", text: "Perfil de baixo risco. Manter hábitos saudáveis e acompanhamento de rotina.", priority: "low" });

  return { score: Math.round(score * 10) / 10, riskLevel: rl, factors, recommendations: recs };
}

// CHART COMPONENT — wrapper for Chart.js

function ChartCanvas({ config, height }) {
  const canvasRef = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    if (!canvasRef.current) return;

    const ctx = canvasRef.current.getContext("2d");
    chartRef.current = new Chart(ctx, {
      ...config,
      options: {
        ...config.options,
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          ...config.options?.plugins,
          legend: { ...config.options?.plugins?.legend, labels: { font: { family: "'DM Sans'", size: 12 }, padding: 16, usePointStyle: true, pointStyle: "circle" } },
        },
      },
    });

    return () => { if (chartRef.current) chartRef.current.destroy(); };
  }, [JSON.stringify(config)]);

  return React.createElement("div", { style: { position: "relative", height: height || 280, width: "100%" } },
    React.createElement("canvas", { ref: canvasRef })
  );
}

            React.createElement("button", { onClick: () => go("seminal"), style: { padding: "12px 22px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #3b82f6, #8b5cf6)", color: "#fff", fontSize: 14, fontWeight: 600 } }, "🔬 Espermograma →")
        )
      )
    );
  }

  // ============================================================
  // SEMINAL FORM
  // ============================================================
  function renderSeminal() {
    const ff = [
      { l: "Volume (mL)", f: "volume", h: "Ref: ≥ 1.4 mL" },
      { l: "pH", f: "ph", h: "Ref: 7.2 – 8.2" },
      { l: "Concentração (×10⁶/mL)", f: "concentration", h: "Ref: ≥ 16" },
      { l: "Motilidade total (%)", f: "motility", h: "Ref: ≥ 42%" },
      { l: "Vitalidade / Vivos (%)", f: "viability", h: "Ref: ≥ 54%" },
      { l: "Morfologia normal (%)", f: "morphology", h: "Ref: ≥ 4%" },
      { l: "Mot. não progressiva (%)", f: "nonProg" },
      { l: "Imóveis (%)", f: "immotile" },
      { l: "Leucócitos (×10⁶/mL)", f: "leukocytes" },
    ];

    return React.createElement("div", { className: "fade-in" },
      React.createElement("h1", { style: { fontSize: 24, fontWeight: 700, color: "#0f172a", marginBottom: 4, fontFamily: "'DM Serif Display', serif" } }, "Parâmetros do Espermograma"),
      React.createElement("p", { style: { color: "#64748b", fontSize: 13.5, marginBottom: 24 } }, "Resultados laboratoriais — Valores de referência OMS (2021)"),
      React.createElement(Card, null,
        React.createElement("div", { className: "grid-3", style: { display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 } },
          ff.map(f => React.createElement(Field, { key: f.f, label: f.l, hint: f.h },
            React.createElement("input", { type: "number", step: "any", style: iStyle, placeholder: "—", value: sd[f.f] || "", onChange: e => us(f.f, e.target.value) })
          ))
        ),
        React.createElement("div", { style: { marginTop: 18, padding: 14, background: "#f0fdf4", borderRadius: 10, border: "1px solid #86efac" } },
          React.createElement("div", { style: { fontSize: 12.5, fontWeight: 600, color: "#166534", marginBottom: 8 } }, "📋 Referências OMS (2021)"),
          React.createElement("div", { style: { display: "flex", flexWrap: "wrap", gap: 8, fontSize: 11.5, color: "#166534" } },
            Object.values(WHO_REFS).map(r => React.createElement("span", { key: r.label, style: { background: "#dcfce7", padding: "3px 9px", borderRadius: 6 } }, r.label + ": " + (r.max ? r.min + "–" + r.max : "≥ " + r.min) + r.unit))
          )
        ),
        React.createElement("div", { className: "nav-buttons", style: { display: "flex", justifyContent: "space-between", marginTop: 24, paddingTop: 18, borderTop: "1px solid #e5e7eb" } },
          React.createElement("button", { onClick: () => go("patient"), style: { padding: "12px 22px", borderRadius: 10, border: "1.5px solid #e2e8f0", background: "#fff", color: "#334155", fontSize: 14, fontWeight: 500 } }, "← Paciente"),
          React.createElement("button", { onClick: run, style: { padding: "12px 28px", borderRadius: 10, border: "none", background: "linear-gradient(135deg, #22c55e, #16a34a)", color: "#fff", fontSize: 14, fontWeight: 700, boxShadow: "0 4px 12px rgba(34,197,94,0.3)" } }, "⚡ Executar Análise")
        )
      )
    );
  }

  // ============================================================
  // PROFESSIONAL FORMS
  // ============================================================
  function renderProf(title, sub, fields, data, updater) {
    return React.createElement("div", { className: "fade-in" },
      React.createElement("h1", { style: { fontSize: 24, fontWeight: 700, color: "#0f172a", marginBottom: 4, fontFamily: "'DM Serif Display', serif" } }, title),
      React.createElement("p", { style: { color: "#64748b", fontSize: 13.5, marginBottom: 24 } }, sub),
      React.createElement(Card, null,
        React.createElement("div", { className: "grid-2", style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14 } },
          fields.map((f, i) => React.createElement(Field, { key: f.f, label: f.l },
            f.t === "select" ? React.createElement(Sel, { value: data[f.f], onChange: v => updater(f.f, v), options: f.o }) :
            React.createElement(Radio, { name: f.f, value: data[f.f] || "", onChange: v => updater(f.f, v), options: f.o })
          ))
        ),
        React.createElement("div", { style: { marginTop: 18, padding: 12, background: "#f0f9ff", borderRadius: 8, fontSize: 12, color: "#0369a1" } }, "ℹ️ Os dados profissionais calibram os pesos do modelo de decisão e validam as recomendações do sistema.")
      )
    );
  }

  const [dd, setDd] = useState({});
  const [psy, setPsy] = useState({});
  function renderDoctor() {
    return renderProf("Formulário Médico", "Percepção profissional sobre infertilidade masculina",
      [
        { l: "Especialidade", t: "select", f: "sp", o: ["Urologia", "Ginecologia", "Andrologia", "Clínica Médica", "Endocrinologia"] },
        { l: "Tempo de graduação", t: "select", f: "exp", o: ["1-5 anos", "6-10 anos", "10-15 anos", "15-20 anos", "Mais de 20 anos"] },
        { l: "Homens procuram o médico em último caso?", t: "radio", f: "lr", o: ["Sim", "Não"] },
        { l: "Frequência de procura por infertilidade", t: "radio", f: "sf", o: ["Esporadicamente", "Moderadamente", "Frequentemente"] },
        { l: "Ansiedade/depressão contribuem?", t: "radio", f: "mi", o: ["Sim", "Não", "Não tive nenhum caso"] },
        { l: "Indica acompanhamento psicológico?", t: "radio", f: "pr", o: ["Sim", "Não"] },
        { l: "Custo é empecilho?", t: "radio", f: "cb", o: ["Sim", "Não"] },
        { l: "Pacientes realizam todos os exames?", t: "select", f: "ec", o: ["Esporadicamente", "Moderadamente", "Frequentemente"] },
      ], dd, (f, v) => setDd(p => ({ ...p, [f]: v })));
  }

  function renderPsy() {
    return renderProf("Formulário Psicólogo / Psiquiatra", "Percepção sobre saúde mental e infertilidade masculina",
      [
        { l: "Tempo de graduação", t: "select", f: "exp", o: ["1-5 anos", "6-10 anos", "10-15 anos", "15-20 anos", "Mais de 20 anos"] },
        { l: "Homens inférteis procuram apoio?", t: "radio", f: "ms", o: ["Sim", "Não"] },
        { l: "Ansiedade causa infertilidade?", t: "radio", f: "ac", o: ["Sim", "Não", "Não tive nenhum caso"] },
        { l: "Depressão causa infertilidade?", t: "radio", f: "dc", o: ["Sim", "Não", "Não tive nenhum caso"] },
        { l: "Estresse causa infertilidade?", t: "radio", f: "sc", o: ["Sim", "Não", "Não tive nenhum caso"] },
        { l: "Psicofármacos contribuem?", t: "radio", f: "mc", o: ["Sim", "Não", "Não tive nenhum caso"] },
        { l: "Indica terapia conjugal?", t: "radio", f: "ct", o: ["Sim", "Não"] },
        { l: "Custo é barreira?", t: "radio", f: "cb", o: ["Sim", "Não"] },
      ], psy, (f, v) => setPsy(p => ({ ...p, [f]: v })));
  }

  // ============================================================
  // RESULTS
  // ============================================================
  function renderResults() {
    if (!result) return React.createElement("div", { className: "fade-in" },
      React.createElement("h1", { style: { fontSize: 24, fontWeight: 700, color: "#0f172a", marginBottom: 24, fontFamily: "'DM Serif Display', serif" } }, "Resultado da Estratificação"),
      React.createElement(Card, { style: { textAlign: "center", padding: 40 } },
        React.createElement("div", { style: { fontSize: 48, marginBottom: 16 } }, "📋"),
        React.createElement("p", { style: { color: "#64748b", fontSize: 14 } }, "Nenhuma análise realizada. Preencha o formulário do paciente e execute a análise."),
        React.createElement("button", { onClick: () => { reset(); go("patient"); }, style: { marginTop: 16, padding: "10px 22px", background: "#3b82f6", color: "#fff", border: "none", borderRadius: 10, fontSize: 13.5, fontWeight: 600 } }, "Iniciar Avaliação")
      )
    );

    const r = result;
    return React.createElement("div", { className: "fade-in" },
      React.createElement("h1", { style: { fontSize: 24, fontWeight: 700, color: "#0f172a", marginBottom: 4, fontFamily: "'DM Serif Display', serif" } }, "Resultado da Estratificação de Risco"),
      React.createElement("p", { style: { color: "#64748b", fontSize: 13.5, marginBottom: 24 } }, "Paciente: " + (pd.age || "N/D") + " anos · Gerado em: " + new Date().toLocaleDateString("pt-BR") + " · " + new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })),

      // Score card
      React.createElement("div", { style: { background: r.riskLevel.bg, borderRadius: 14, padding: 24, marginBottom: 20, border: "2px solid " + r.riskLevel.color, boxShadow: "0 4px 20px " + r.riskLevel.color + "18" } },
        React.createElement("div", { className: "score-row", style: { display: "flex", alignItems: "center", gap: 22, flexWrap: "wrap" } },
          React.createElement("div", { style: { width: 96, height: 96, borderRadius: "50%", background: "conic-gradient(" + r.riskLevel.color + " " + Math.min(r.score / 20 * 360, 360) + "deg, #e2e8f0 0deg)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 } },
            React.createElement("div", { style: { width: 76, height: 76, borderRadius: "50%", background: "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column" } },
              React.createElement("span", { style: { fontSize: 22, fontWeight: 800, color: r.riskLevel.color } }, r.score),
              React.createElement("span", { style: { fontSize: 10, color: "#94a3b8" } }, "pontos")
            )
          ),
          React.createElement("div", { style: { flex: 1 } },
            React.createElement("div", { style: { display: "inline-block", padding: "5px 14px", borderRadius: 8, background: r.riskLevel.color + "20", color: r.riskLevel.color, fontSize: 15, fontWeight: 700, marginBottom: 8 } }, "Risco " + r.riskLevel.label),
            React.createElement("p", { style: { color: "#334155", fontSize: 13.5, lineHeight: 1.6 } }, r.riskLevel.rec)
          )
        )
      ),

      // Factors + Recs
      React.createElement("div", { className: "grid-2", style: { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 20 } },
        React.createElement(Card, null,
          React.createElement("h3", { style: { fontSize: 14, fontWeight: 700, color: "#0f172a", marginBottom: 14 } }, "⚠️ Fatores de Risco Identificados"),
          r.factors.length === 0 ? React.createElement("p", { style: { color: "#94a3b8", fontSize: 13 } }, "Nenhum fator significativo.") :
          r.factors.sort((a, b) => b.weight - a.weight).map((f, i) =>
            React.createElement("div", { key: i, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "9px 0", borderBottom: i < r.factors.length - 1 ? "1px solid #f1f5f9" : "none" } },
              React.createElement("div", { style: { display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" } },
                React.createElement("span", { style: { fontSize: 13, fontWeight: 500, color: "#334155" } }, f.name),
                React.createElement(Badge, { text: f.category, color: "#64748b" })
              ),
              React.createElement("span", { style: { fontSize: 13, fontWeight: 700, color: f.weight >= 3 ? "#ef4444" : f.weight >= 2 ? "#f59e0b" : "#22c55e", whiteSpace: "nowrap" } }, "+" + f.weight)
            )
          )
        ),
        React.createElement(Card, null,
          React.createElement("h3", { style: { fontSize: 14, fontWeight: 700, color: "#0f172a", marginBottom: 14 } }, "💡 Recomendações do CDSS"),
          r.recommendations.map((rec, i) =>
            React.createElement("div", { key: i, style: { padding: 12, marginBottom: 8, borderRadius: 10, background: rec.priority === "high" ? "#fef2f2" : rec.priority === "medium" ? "#fffbeb" : "#f0fdf4", border: "1px solid " + (rec.priority === "high" ? "#fca5a5" : rec.priority === "medium" ? "#fcd34d" : "#86efac") } },
              React.createElement("div", { style: { fontSize: 12.5, color: "#334155", lineHeight: 1.55 } }, rec.icon + " " + rec.text)
            )
          )
        )
      ),

      // Chart: factor contribution
      r.factors.length > 0 && React.createElement(Card, { style: { marginBottom: 20 } },
        React.createElement("h3", { style: { fontSize: 14, fontWeight: 700, color: "#0f172a", marginBottom: 14 } }, "Contribuição dos Fatores ao Score Total"),
        React.createElement(ChartCanvas, { height: 200, config: {
          type: "bar",
          data: {
            labels: r.factors.sort((a,b) => b.weight - a.weight).map(f => f.name),
            datasets: [{ data: r.factors.map(f => f.weight), backgroundColor: r.factors.map(f => f.weight >= 3 ? "#ef444499" : f.weight >= 2 ? "#f59e0b99" : "#22c55e99"), borderRadius: 4, barThickness: 22 }]
          },
          options: { indexAxis: "y", plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, grid: { color: "#f1f5f9" }, ticks: { font: { size: 11 } } }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } } }
        }})
      ),

      // Actions
      React.createElement("div", { style: { display: "flex", gap: 10, justifyContent: "flex-end", flexWrap: "wrap" } },
        React.createElement("button", { onClick: save, style: { padding: "10px 22px", borderRadius: 10, border: "1.5px solid #e2e8f0", background: "#fff", color: "#334155", fontSize: 13.5, fontWeight: 500 } }, "💾 Salvar"),
        React.createElement("button", { onClick: () => { reset(); go("patient"); }, style: { padding: "10px 22px", borderRadius: 10, border: "none", background: "#3b82f6", color: "#fff", fontSize: 13.5, fontWeight: 600 } }, "➕ Nova Avaliação")
      )
    );
  }

  // ============================================================
  // HISTORY
  // ============================================================
  function renderHistory() {
    return React.createElement("div", { className: "fade-in" },
      React.createElement("h1", { style: { fontSize: 24, fontWeight: 700, color: "#0f172a", marginBottom: 4, fontFamily: "'DM Serif Display', serif" } }, "Histórico de Avaliações"),
      React.createElement("p", { style: { color: "#64748b", fontSize: 13.5, marginBottom: 24 } }, "Registros salvos durante a sessão"),
      saved.length === 0 ?
        React.createElement(Card, { style: { textAlign: "center", padding: 40 } },
          React.createElement("div", { style: { fontSize: 48, marginBottom: 16 } }, "📁"),
          React.createElement("p", { style: { color: "#94a3b8" } }, "Nenhuma avaliação salva.")
        ) :
        React.createElement("div", { style: { background: "#fff", borderRadius: 14, overflow: "hidden", border: "1px solid #e5e7eb" } },
          React.createElement("div", { style: { overflowX: "auto" } },
            React.createElement("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 13.5, minWidth: 500 } },
              React.createElement("thead", null,
                React.createElement("tr", { style: { background: "#f8fafc" } },
                  ["#", "Data", "Idade", "Score", "Risco", "Fatores"].map(h =>
                    React.createElement("th", { key: h, style: { padding: "12px 14px", textAlign: "left", fontWeight: 600, color: "#64748b", fontSize: 11.5, borderBottom: "1px solid #e5e7eb", whiteSpace: "nowrap" } }, h)
                  )
                )
              ),
              React.createElement("tbody", null,
                saved.map(p =>
                  React.createElement("tr", { key: p.id, style: { borderBottom: "1px solid #f1f5f9" } },
                    React.createElement("td", { style: { padding: "11px 14px", fontWeight: 600 } }, p.id),
                    React.createElement("td", { style: { padding: "11px 14px" } }, p.date),
                    React.createElement("td", { style: { padding: "11px 14px" } }, p.age + " anos"),
                    React.createElement("td", { style: { padding: "11px 14px", fontWeight: 700 } }, p.score),
                    React.createElement("td", { style: { padding: "11px 14px" } }, React.createElement(Badge, { text: p.risk.label, color: p.risk.color })),
                    React.createElement("td", { style: { padding: "11px 14px" } }, p.factors)
                  )
                )
              )
            )
          )
        )
    );
  }

  // ============================================================
  // LAYOUT
  // ============================================================
  const tabs = { dashboard: renderDashboard, charts: renderCharts, patient: renderPatient, seminal: renderSeminal, doctor: renderDoctor, psy: renderPsy, results: renderResults, history: renderHistory };

  return React.createElement("div", { style: { height: "100%", display: "flex", flexDirection: "column", background: "#f1f5f9" } },
    header, overlay,
    React.createElement("div", { style: { display: "flex", flex: 1, overflow: "hidden" } },
      sidebar,
      React.createElement("main", { className: "main-content", style: { flex: 1, padding: "24px 28px", overflowY: "auto" } },
        (tabs[tab] || renderDashboard)()
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
